      body {

        height: 80px;

        margin-bottom: 32px;
      }
      .btn-home {

        border-radius: 12px;
        font-size: 15px;
        font-weight: 600;
        transition: all 0.2s ease;
        box-shadow: 0 4px 14px rgba(30, 58, 95, 0.3);
      }
      .btn-home:hover {

        box-shadow: 0 6px 20px rgba(30, 58, 95, 0.4);
      }
      .btn-home svg {
        width: 18px;
        height: 18px;
      }
      .footer-text {
        margin-top: 32px;
        font-size: 13px;
        color: #94A3B8;
      }
      @media (max-width: 480px) {
        .container { padding: 32px 24px; }
        .error-code { font-size: 64px; }
        h1 { font-size: 20px; }
      }
